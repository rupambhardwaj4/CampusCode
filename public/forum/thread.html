<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thread Discussion - CampusCode</title>
  <link rel="shortcut icon" href="/campuscode-logo.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: { sans: ["Poppins", "sans-serif"] },
          colors: {
            primary: { 50: "#E7F0FA", 100: "#D0E1F5", 200: "#7BA4D0", 300: "#4D84C0", 400: "#2E5E99", 500: "#1E4A7A", 600: "#0D2440" },
            dark: { bg: "#111827", card: "#1F2937", text: "#F9FAFB", border: "#374151" }
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Poppins', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .dark ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #7ba4d0; border-radius: 3px; }
    
    /* Sidebar Styles matching Dashboard EXACTLY */
    .sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
    .sidebar-brand { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
    .sidebar-brand-logo { width: 2.25rem; height: 2.25rem; object-fit: contain; flex-shrink: 0; }
    .nav-item {
        transition: all 0.2s ease;
        position: relative;
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        margin-bottom: 0.25rem;
        color: #374151;
        border-radius: 0.5rem;
        cursor: pointer;
        white-space: nowrap;
    }
    .nav-item:hover { background-color: #f3f4f6; }
    .dark .nav-item { color: #d1d5db; }
    .dark .nav-item:hover { background-color: #374151; }
    .nav-item.active { background-color: #d0e1f5; color: #1e4a7a; font-weight: 600; }
    .dark .nav-item.active { background-color: #1e4a7a; color: #ffffff; }
    .nav-item.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        height: 60%;
        width: 4px;
        background-color: #2e5e99;
        border-radius: 0 4px 4px 0;
    }
    .dark .nav-item.active::before { background-color: #60a5fa; }
    .nav-item i { width: 1.5rem; text-align: center; margin-right: 0.75rem; font-size: 1.1rem; flex-shrink: 0; }
    .nav-item span { font-size: 0.875rem; }

    /* Markdown/Thread Content Styles */
    .prose a { color: #3b82f6; text-decoration: none; }
    .prose a:hover { text-decoration: underline; }
    .prose code { background-color: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; color: #ef4444; }
    .dark .prose code { background-color: #334155; color: #f87171; }
    .prose pre { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-top: 1rem; margin-bottom: 1rem; }
    .dark .prose pre { background-color: #0f172a; border: 1px solid #334155; }
    .prose pre code { background-color: transparent; color: inherit; padding: 0; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen font-sans transition-colors duration-200">
  <div id="appShell" class="flex h-screen overflow-hidden">
    
    <aside id="mainSidebar" class="sidebar w-64 bg-white dark:bg-gray-800 shadow-sm border-r border-gray-200 dark:border-gray-700 flex flex-col h-screen flex-shrink-0 transition-colors duration-200 z-50">
        <div class="p-6 flex-shrink-0 flex items-center justify-between h-[88px]">
            <div class="sidebar-brand text-2xl font-bold text-gray-800 dark:text-white overflow-hidden whitespace-nowrap">
                <img src="/campuscode-logo.jpeg" alt="CampusCode logo" class="sidebar-brand-logo rounded-md shadow-sm">
                <span class="transition-all duration-300 opacity-100 w-auto">CampusCode<span class="text-primary-400 dark:text-primary-200 text-xs align-top ml-0.5">SA</span></span>
            </div>
        </div>

        <nav id="roleSidebarNav" class="flex-1 px-4 space-y-1 overflow-y-auto mt-2">
            <!-- Populated by forum.js dynamically based on user role -->
        </nav>

        <div class="p-4 space-y-1 border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex-shrink-0 bottom-menu">
            <a href="/auth/logout" class="nav-item text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </a>
            <div class="w-full text-left flex items-center gap-3 p-3 rounded-xl bg-gray-50 dark:bg-gray-700 mt-2 border border-gray-100 dark:border-gray-600">
                <div id="sidebarAvatar" class="w-10 h-10 rounded-full bg-primary-500 flex items-center justify-center text-white font-bold text-sm shadow-inner">
                    SA
                </div>
                <div class="min-w-0">
                    <div id="sidebarName" class="text-sm font-bold text-gray-800 dark:text-white truncate leading-tight">Superadmin</div>
                    <div id="sidebarRole" class="text-[10px] text-primary-500 dark:text-primary-200 font-semibold uppercase tracking-wider">SuperAdmin</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 overflow-y-auto w-full relative">
      
      <header class="bg-white dark:bg-gray-800 shadow-sm transition-colors duration-200 sticky top-0 z-40 border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
          
          <div class="flex items-center gap-4">
            <a href="/forum/forum.html" class="w-9 h-9 flex items-center justify-center rounded-xl bg-gray-50 hover:bg-gray-100 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300 transition-colors border border-gray-200 dark:border-gray-600">
              <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
              <h1 class="text-xl font-bold text-gray-800 dark:text-white tracking-tight">Discussion Thread</h1>
              <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mt-0.5">View and participate in this conversation.</p>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <button onclick="toggleTheme()" class="p-2 rounded-full text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none transition-transform active:scale-95 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600">
              <i id="theme-toggle-dark-icon" class="fa-solid fa-moon dark:hidden text-lg"></i>
              <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden dark:block text-lg"></i>
            </button>
          </div>

        </div>
      </header>

      <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-gray-800 dark:text-gray-100">
        
        <div id="loadingState" class="py-20 flex flex-col items-center justify-center">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-primary-500 dark:text-primary-400 mb-4"></i>
            <p class="text-gray-500 dark:text-gray-400 font-medium">Loading thread...</p>
        </div>

        <div id="threadContentArea" class="hidden">
            <article class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 sm:p-8 mb-6 transition-colors duration-200 relative">
                
                <div class="flex items-start justify-between gap-4 mb-6">
                    <div class="flex items-center gap-3">
                        <div id="opAvatar" class="w-12 h-12 rounded-full bg-primary-100 text-primary-600 dark:bg-primary-900/30 dark:text-primary-400 flex items-center justify-center font-bold text-lg border border-primary-200 dark:border-primary-800 shadow-sm">
                            U
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <h3 id="opName" class="font-bold text-gray-900 dark:text-white">Loading User...</h3>
                                <span id="opRole" class="text-[10px] bg-primary-50 text-primary-600 border border-primary-200 dark:bg-primary-900/30 dark:text-primary-400 dark:border-primary-800 px-2 py-0.5 rounded font-bold uppercase tracking-wider">User</span>
                            </div>
                            <div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5 flex items-center gap-2">
                                <span id="opDate">Just now</span>
                            </div>
                        </div>
                    </div>
                    
                    <div id="threadCategory" class="hidden sm:inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-xs font-semibold text-gray-600 dark:text-gray-300">
                        <i class="fa-solid fa-tag"></i> <span id="opTopic">General</span>
                    </div>
                </div>

                <h1 id="threadTitle" class="text-2xl font-bold text-gray-900 dark:text-white mb-4 leading-tight">
                    Loading Title...
                </h1>
                
                <div id="threadBody" class="prose dark:prose-invert max-w-none text-gray-700 dark:text-gray-300 leading-relaxed text-sm sm:text-base">
                    </div>

                <div class="mt-8 pt-5 border-t border-gray-100 dark:border-gray-700 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button id="upvoteBtn" class="flex items-center gap-2 text-gray-500 hover:text-primary-600 dark:text-gray-400 dark:hover:text-primary-400 transition-colors font-semibold text-sm bg-gray-50 dark:bg-gray-700/50 hover:bg-primary-50 dark:hover:bg-gray-700 px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-600">
                            <i class="fa-solid fa-arrow-up"></i>
                            <span id="upvoteCount">0</span>
                        </button>
                        <button id="downvoteBtn" class="flex items-center gap-2 text-gray-500 hover:text-primary-600 dark:text-gray-400 dark:hover:text-primary-400 transition-colors font-semibold text-sm bg-gray-50 dark:bg-gray-700/50 hover:bg-primary-50 dark:hover:bg-gray-700 px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-600">
                            <i class="fa-solid fa-arrow-down"></i>
                            <span id="downvoteCount">0</span>
                        </button>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="editThreadBtn" class="hidden flex items-center gap-2 text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 transition-colors font-semibold text-sm bg-blue-50 dark:bg-blue-900/20 px-3 py-1.5 rounded-lg border border-blue-200 dark:border-blue-800">
                            <i class="fa-solid fa-pen"></i> Edit
                        </button>
                        <button id="deleteThreadBtn" class="hidden flex items-center gap-2 text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300 transition-colors font-semibold text-sm bg-red-50 dark:bg-red-900/20 px-3 py-1.5 rounded-lg border border-red-200 dark:border-red-800">
                            <i class="fa-solid fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            </article>

            <div class="mb-6 flex items-center gap-3">
                <h3 class="text-xl font-bold text-gray-800 dark:text-white flex items-center gap-2">
                    <i class="fa-solid fa-comments text-primary-500"></i>
                    <span id="replyCountTitle">0 Replies</span>
                </h3>
                <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
            </div>

            <div id="repliesContainer" class="space-y-4 mb-8">
                </div>

            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 sm:p-8 transition-colors duration-200">
                <h4 class="text-base font-bold text-gray-800 dark:text-white mb-4">Add your reply</h4>
                <form id="replyForm" class="space-y-4">
                    <div class="border border-gray-300 dark:border-gray-600 rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-primary-400 focus-within:border-transparent transition-all bg-white dark:bg-gray-700">
                        <textarea id="replyContent" rows="4" required placeholder="Write your response here. Be respectful and helpful..." 
                            class="w-full px-4 py-3 bg-transparent text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 outline-none resize-y border-0 focus:ring-0"></textarea>
                        <div class="bg-gray-50 dark:bg-gray-700/80 px-4 py-3 border-t border-gray-200 dark:border-gray-600 flex justify-between items-center">
                            <span class="text-xs font-medium text-gray-500 dark:text-gray-400"><i class="fa-brands fa-markdown mr-1"></i> Markdown supported</span>
                            <button type="submit" id="submitReplyBtn" class="px-5 py-2 rounded-xl text-sm font-semibold bg-primary-500 text-white hover:bg-primary-600 shadow-sm transition-all flex justify-center items-center gap-2">
                                <i class="fa-solid fa-paper-plane"></i> Post Reply
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
  <script src="/js/forum.js"></script>
</body>
</html>
