<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contest Details - SuperAdmin</title>
    <link rel="shortcut icon" href="/campuscode-logo.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { fontFamily: { sans: ["Poppins", "sans-serif"] } } } };
    </script>
    <link rel="stylesheet" href="/css/role-dark-fixes.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen font-sans">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col">
            <div class="p-6 text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-3">
                <img src="/campuscode-logo.jpeg" class="w-9 h-9 rounded-md" alt="logo"> CampusCode
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a href="/superadmin/dashboard" class="block px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300">Manage Colleges</a>
                <a href="/superadmin/problems" class="block px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300">Manage Problems</a>
                <a href="/superadmin/contest" class="block px-4 py-3 rounded-lg bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 font-semibold">Manage Contests</a>
                <a href="/superadmin/support" class="block px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300">Support Tickets</a>
                <a href="/forum/forum.html" class="block px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300">Community Forum</a>
            </nav>
        </aside>

        <div class="flex-1 overflow-y-auto">
            <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-4 flex items-center justify-between sticky top-0 z-20">
                <div>
                    <a href="/superadmin/contest" class="text-sm text-blue-600 dark:text-blue-400 font-semibold"><i class="fa-solid fa-arrow-left mr-2"></i>Back to Contests</a>
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white mt-1">Contest Details</h1>
                </div>
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-300">
                    <i class="fa-solid fa-moon dark:hidden"></i><i class="fa-solid fa-sun hidden dark:block"></i>
                </button>
            </header>

            <main class="max-w-7xl mx-auto px-6 py-6 space-y-6 text-gray-800 dark:text-gray-100">
                <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-5">
                        <h2 id="contestTitle" class="text-xl font-bold">Loading...</h2>
                        <p id="contestDescription" class="text-sm text-gray-600 dark:text-gray-400 mt-2"></p>
                        <div class="mt-3 text-sm text-gray-600 dark:text-gray-300 flex flex-wrap gap-3">
                            <span><b>Class:</b> <span id="contestClass">-</span></span>
                            <span><b>Status:</b> <span id="contestStatus">-</span></span>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-5"><div class="text-xs uppercase text-gray-500">Mapped Problems</div><div id="sumProblems" class="text-3xl font-bold mt-2">0</div></div>
                    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-5"><div class="text-xs uppercase text-gray-500">Participants</div><div id="sumParticipants" class="text-3xl font-bold mt-2">0</div></div>
                </section>

                <section class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold text-lg">Problem Management</h3>
                        <button onclick="openProblemOverlay()" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold"><i class="fa-solid fa-layer-group mr-2"></i>Manage Problems</button>
                    </div>
                    <div id="problemList" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </section>

                <section class="grid grid-cols-1 xl:grid-cols-2 gap-6">
                    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-5">
                        <h3 class="font-bold text-lg mb-3">Leaderboard</h3>
                        <div class="overflow-auto max-h-80">
                            <table class="w-full text-sm">
                                <thead class="text-left text-gray-500 border-b border-gray-200 dark:border-gray-700">
                                    <tr><th class="py-2">Rank</th><th>Name</th><th class="text-right">Score</th><th class="text-right">Solved</th></tr>
                                </thead>
                                <tbody id="leaderboardRows"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-5">
                        <h3 class="font-bold text-lg mb-3">Student Data</h3>
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <input id="fSearch" placeholder="Search name/email" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
                            <select id="fClass" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700"><option value="">All Classes</option></select>
                            <select id="fProgram" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700"><option value="">All Programs</option></select>
                            <select id="fBranch" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700"><option value="">All Branches</option></select>
                        </div>
                        <button onclick="loadDetails()" class="mb-3 px-3 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 text-sm">Apply Filters</button>
                        <div class="overflow-auto max-h-80">
                            <table class="w-full text-sm">
                                <thead class="text-left text-gray-500 border-b border-gray-200 dark:border-gray-700"><tr><th class="py-2">Name</th><th>Program</th><th>Branch</th><th class="text-center">Joined</th></tr></thead>
                                <tbody id="studentRows"></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div id="problemOverlay" class="fixed inset-0 z-50 hidden items-center justify-center px-4 bg-black/50">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-3xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 class="font-bold">Map Problems</h3>
                <button onclick="closeProblemOverlay()"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-4 max-h-[60vh] overflow-auto" id="allProblemsList"></div>
            <div class="px-5 py-4 border-t border-gray-200 dark:border-gray-700 text-right">
                <button onclick="closeProblemOverlay()" class="px-3 py-2 rounded-lg border mr-2">Cancel</button>
                <button onclick="saveMappedProblems()" class="px-4 py-2 rounded-lg bg-blue-600 text-white">Save</button>
            </div>
        </div>
    </div>

    <script>
        const contestId = Number("<%= contestId %>");
        const state = { details: null, allProblems: [], selected: new Set() };
        if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');
        function toggleTheme(){ document.documentElement.classList.toggle('dark'); localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'; }
        function esc(v){ return String(v || '').replace(/[&<>"']/g, (s) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s])); }
        async function fetchJson(url, opt={}){
            const r = await fetch(url, opt); const t = await r.text(); let d={}; try{ d=t?JSON.parse(t):{}; }catch{ throw new Error(`Request failed (${r.status})`); }
            if(!r.ok || d.success===false) throw new Error(d.error || `Request failed (${r.status})`); return d;
        }
        function fillFilterOptions(filters){
            const classSel = document.getElementById('fClass'); const progSel = document.getElementById('fProgram'); const branchSel = document.getElementById('fBranch');
            classSel.innerHTML = '<option value="">All Classes</option>' + (filters.classes || []).map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
            progSel.innerHTML = '<option value="">All Programs</option>' + (filters.programs || []).map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
            branchSel.innerHTML = '<option value="">All Branches</option>' + (filters.branches || []).map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
        }
        function renderDetails(){
            const d = state.details;
            document.getElementById('contestTitle').textContent = d.contest.title || '-';
            document.getElementById('contestDescription').textContent = d.contest.description || 'No description';
            document.getElementById('contestClass').textContent = d.contest.contest_class || 'E';
            document.getElementById('contestStatus').textContent = d.contest.status || '-';
            document.getElementById('sumProblems').textContent = d.summary.mappedProblems || 0;
            document.getElementById('sumParticipants').textContent = d.summary.participants || 0;
            document.getElementById('problemList').innerHTML = (d.problems || []).length
                ? d.problems.map(p => `<div class="p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/40"><div class="font-semibold">${esc(p.title)}</div><div class="text-xs text-gray-500 mt-1">${esc(p.difficulty || '')}</div></div>`).join('')
                : `<div class="text-sm text-gray-500 italic">No problems mapped yet.</div>`;
            document.getElementById('leaderboardRows').innerHTML = (d.leaderboard || []).length
                ? d.leaderboard.map((r, i) => `<tr class="border-b border-gray-100 dark:border-gray-700"><td class="py-2 font-semibold">#${i+1}</td><td>${esc(r.fullname || r.fullName || r.email || 'Unknown')}</td><td class="text-right">${Number(r.score || 0)}</td><td class="text-right">${Number(r.solvedcount || r.solvedCount || 0)}</td></tr>`).join('')
                : `<tr><td colspan="4" class="py-6 text-center text-gray-500 italic">No leaderboard data.</td></tr>`;
            document.getElementById('studentRows').innerHTML = (d.students || []).length
                ? d.students.map(s => `<tr class="border-b border-gray-100 dark:border-gray-700"><td class="py-2">${esc(s.fullname || s.fullName || '')}<div class="text-xs text-gray-500">${esc(s.email || '')}</div></td><td>${esc(s.program || '-')}</td><td>${esc(s.branch || '-')}</td><td class="text-center">${Number(s.joined || 0) ? '<span class="text-green-600 font-semibold">Yes</span>' : '<span class="text-gray-500">No</span>'}</td></tr>`).join('')
                : `<tr><td colspan="4" class="py-6 text-center text-gray-500 italic">No students found.</td></tr>`;
        }
        async function loadDetails(){
            const sp = new URLSearchParams();
            const search = document.getElementById('fSearch').value.trim(); const cls = document.getElementById('fClass').value; const program = document.getElementById('fProgram').value; const branch = document.getElementById('fBranch').value;
            if(search) sp.set('search', search); if(cls) sp.set('class', cls); if(program) sp.set('program', program); if(branch) sp.set('branch', branch);
            const data = await fetchJson(`/superadmin/api/contests/${contestId}/details?` + sp.toString());
            state.details = data.details; fillFilterOptions(data.details.filters || {}); state.selected = new Set((data.details.problems || []).map(p => Number(p.id))); renderDetails();
        }
        async function openProblemOverlay(){
            if (!state.allProblems.length) {
                const data = await fetchJson('/api/problems');
                state.allProblems = (data.problems || []).map(p => ({ id: Number(p.id), title: p.title || `Problem #${p.id}` }));
            }
            document.getElementById('allProblemsList').innerHTML = state.allProblems.map(p => `
                <label class="flex items-center gap-3 p-2 rounded hover:bg-gray-50 dark:hover:bg-gray-700">
                    <input type="checkbox" value="${p.id}" ${state.selected.has(p.id) ? 'checked' : ''} onchange="toggleProblem(${p.id}, this.checked)">
                    <span>${esc(p.title)}</span>
                </label>
            `).join('');
            document.getElementById('problemOverlay').classList.remove('hidden'); document.getElementById('problemOverlay').classList.add('flex');
        }
        function toggleProblem(id, checked){ if(checked) state.selected.add(Number(id)); else state.selected.delete(Number(id)); }
        function closeProblemOverlay(){ document.getElementById('problemOverlay').classList.add('hidden'); document.getElementById('problemOverlay').classList.remove('flex'); }
        async function saveMappedProblems(){
            const selected = state.allProblems.filter(p => state.selected.has(Number(p.id))).map(p => ({ id: Number(p.id), title: p.title }));
            await fetchJson(`/superadmin/api/contests/${contestId}/problems`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ problems: selected }) });
            closeProblemOverlay(); await loadDetails();
        }
        loadDetails().catch((e) => { alert(e.message || 'Failed to load contest details'); });
    </script>
    <script src="/js/role-logo-fixes.js"></script>
</body>
</html>
