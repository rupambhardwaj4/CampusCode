    <style>
      /* --- Global Styles --- */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      .dark ::-webkit-scrollbar-track { background: #111827; }
      ::-webkit-scrollbar-thumb { background: #7ba4d0; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #2e5e99; }

      /* --- Sidebar Specifics --- */
      .sidebar {
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
      }
    
      .nav-item {
        transition: all 0.2s ease;
        position: relative;
        display: flex;
        align-items: center; 
        padding: 0.75rem 1rem; 
        margin-bottom: 0.25rem;
        color: #374151; 
        border-radius: 0.5rem; 
        cursor: pointer;
        white-space: nowrap;
      }

      .dark .nav-item { color: #d1d5db;  }
      .nav-item:hover { background-color: #f3f4f6; }
      .dark .nav-item:hover { background-color: #374151; }
      .nav-item.active { background-color: #d0e1f5; color: #1e4a7a; }
      .dark .nav-item.active { background-color: #1e4a7a; color: #ffffff; }

      .nav-item.active::before {
        content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
        height: 60%; width: 4px; background-color: #2e5e99; border-radius: 0 4px 4px 0;
      }
      .dark .nav-item.active::before { background-color: #60a5fa; }

      .nav-item i { width: 1.5rem; text-align: center; margin-right: 0.75rem; font-size: 1.1rem; flex-shrink: 0; }
      .nav-item span { font-size: 0.875rem; font-weight: 500; }

      /* Collapsed Sidebar overrides */
      .sidebar.collapsed .nav-item { justify-content: center; padding-left: 0; padding-right: 0; }
      .sidebar.collapsed .nav-item i { margin-right: 0; font-size: 1.25rem; }
      .sidebar.collapsed .nav-item span { display: none; }

      /* Custom Checkbox */
      input[type="checkbox"] {
        -webkit-appearance: none; appearance: none;
        width: 1.25rem; height: 1.25rem;
        border: 2px solid #cbd5e1; border-radius: 0.25rem;
        cursor: pointer; display: grid; place-content: center;
      }
      .dark input[type="checkbox"] { border-color: #4b5563; background-color: #374151; }
      
      input[type="checkbox"]::before {
        content: ""; width: 0.75rem; height: 0.75rem;
        transform: scale(0); transition: 120ms transform ease-in-out;
        box-shadow: inset 1em 1em white; background-color: white;
        transform-origin: center;
        clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
      }
      
      input[type="checkbox"]:checked { background-color: #2E5E99; border-color: #2E5E99; }
      input[type="checkbox"]:checked::before { transform: scale(1); }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 1. SIDEBAR TOGGLE LOGIC ---
            const sidebar = document.getElementById('mainSidebar');
            const toggleBtn = document.getElementById('sidebarToggleBtn');
            const toggleIcon = toggleBtn ? toggleBtn.querySelector('i') : null;
            const sidebarLogoText = document.getElementById('sidebarLogoText');
            const headerLogoText = document.getElementById('headerLogoText');

            if (toggleBtn && sidebar) {
                toggleBtn.addEventListener('click', () => {
                    sidebar.classList.toggle('collapsed');

                    // Check if collapsed via class
                    if (sidebar.classList.contains('collapsed')) {
                        // COLLAPSE
                        sidebar.classList.replace('w-64', 'w-20');
                        if(toggleIcon) toggleIcon.style.transform = 'rotate(180deg)';
                        
                        // Sidebar Text (immediate hide)
                        if(sidebarLogoText) {
                            sidebarLogoText.style.opacity = '0';
                            sidebarLogoText.style.width = '0px';
                        }
                        
                        // Header Text (fade in)
                        if(headerLogoText) {
                            headerLogoText.classList.remove('hidden');
                            setTimeout(() => {
                                headerLogoText.classList.remove('opacity-0', '-translate-x-2');
                            }, 50);
                        }

                    } else {
                        // EXPAND
                        sidebar.classList.replace('w-20', 'w-64');
                        if(toggleIcon) toggleIcon.style.transform = 'rotate(0deg)';
                        
                        // Sidebar Text (fade in)
                        if(sidebarLogoText) {
                            sidebarLogoText.style.opacity = '1';
                            sidebarLogoText.style.width = 'auto';
                        }

                        // Header Text (fade out)
                        if(headerLogoText) {
                            headerLogoText.classList.add('opacity-0', '-translate-x-2');
                            setTimeout(() => {
                                headerLogoText.classList.add('hidden');
                            }, 300);
                        }
                    }
                });
            }

            // --- 2. SETTINGS, THEME & ACCORDION LOGIC ---
            const settingsTrigger = document.getElementById('settingsTrigger');
            const settingsMenu = document.getElementById('settingsMenu');
            const themeAccordionBtn = document.getElementById('themeAccordionBtn');
            const themeOptionsContainer = document.getElementById('themeOptionsContainer');
            const themeChevron = document.getElementById('themeChevron');
            const themeOptions = document.querySelectorAll('.theme-option');
            const headerThemeBtn = document.getElementById('themeToggleBtn');
            const headerThemeIcon = headerThemeBtn ? headerThemeBtn.querySelector('i') : null;

            // A. Apply Theme Function
            function applyTheme(themeName) {
                const html = document.documentElement;
                
                if (themeName === 'dark') {
                    html.classList.add('dark');
                    localStorage.theme = 'dark';
                } else if (themeName === 'light') {
                    html.classList.remove('dark');
                    localStorage.theme = 'light';
                } else {
                    // System Preference
                    localStorage.removeItem('theme');
                    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        html.classList.add('dark');
                    } else {
                        html.classList.remove('dark');
                    }
                }

                // Update Header Icon
                if (headerThemeIcon) {
                    if (html.classList.contains('dark')) {
                        headerThemeIcon.classList.replace('fa-moon', 'fa-sun');
                    } else {
                        headerThemeIcon.classList.replace('fa-sun', 'fa-moon');
                    }
                }

                // Update Settings Menu Checkmarks
                themeOptions.forEach(btn => {
                    const checkIcon = btn.querySelector('.check-icon');
                    const isSelected = btn.getAttribute('data-value') === themeName;
                    
                    if (isSelected) {
                        btn.classList.add('bg-primary-50', 'dark:bg-primary-900/20', 'text-primary-600', 'dark:text-primary-400');
                        checkIcon.classList.remove('opacity-0');
                    } else {
                        btn.classList.remove('bg-primary-50', 'dark:bg-primary-900/20', 'text-primary-600', 'dark:text-primary-400');
                        checkIcon.classList.add('opacity-0');
                    }
                });
            }

            // B. Toggle Settings Menu
            if (settingsTrigger && settingsMenu) {
                settingsTrigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    settingsMenu.classList.toggle('hidden');
                    
                    // Adjust position if sidebar is collapsed
                    if (sidebar && sidebar.classList.contains('collapsed')) {
                        settingsMenu.style.left = '80px';
                    } else {
                        settingsMenu.style.left = '16px';
                    }
                });

                document.addEventListener('click', (e) => {
                    if (!settingsMenu.contains(e.target) && !settingsTrigger.contains(e.target)) {
                        settingsMenu.classList.add('hidden');
                    }
                });
            }

            // C. Toggle Theme Accordion
            if (themeAccordionBtn && themeOptionsContainer) {
                themeAccordionBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    themeOptionsContainer.classList.toggle('hidden');
                    themeChevron.style.transform = themeOptionsContainer.classList.contains('hidden') 
                        ? 'rotate(0deg)' 
                        : 'rotate(90deg)';
                });
            }

            // D. Theme Option Clicks
            themeOptions.forEach(option => {
                option.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const selectedTheme = option.getAttribute('data-value');
                    applyTheme(selectedTheme);
                });
            });

            // E. Header Quick Toggle
            if (headerThemeBtn) {
                headerThemeBtn.addEventListener('click', () => {
                    const isDark = document.documentElement.classList.contains('dark');
                    applyTheme(isDark ? 'light' : 'dark');
                });
            }

            // F. Initialize
            const savedTheme = localStorage.theme || 'system';
            applyTheme(savedTheme);

            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (!localStorage.theme) applyTheme('system');
            });


            // --- 3. OVERLAYS & NOTIFICATIONS ---
            const overlay = document.getElementById("profileOverlay");
            const headerProfileBtn = document.getElementById("headerProfileBtn");
            const closeBtn = document.getElementById("closeProfileOverlay");
            if(headerProfileBtn && overlay) headerProfileBtn.addEventListener("click", () => overlay.classList.remove("hidden"));
            if(closeBtn && overlay) closeBtn.addEventListener("click", () => overlay.classList.add("hidden"));
            if(overlay) overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.add("hidden"); });

            const notifBtn = document.getElementById('notificationBtn');
            const notifDropdown = document.getElementById('notificationDropdown');
            if (notifBtn && notifDropdown) {
                notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifDropdown.classList.toggle('hidden'); });
                document.addEventListener('click', (e) => {
                    if(!notifDropdown.contains(e.target) && !notifBtn.contains(e.target)) notifDropdown.classList.add('hidden');
                });
            }
             if(overlay) overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.add("hidden"); });

    // *** PASTE LOGOUT LOGIC HERE ***
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
            window.location.href = '../../index.html';
        });
    }

            const content = document.getElementById('content');
            const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
            const getContestId = () => {
                const parts = window.location.pathname.split('/').filter(Boolean);
                const id = Number(parts[parts.length - 1]);
                if (Number.isInteger(id) && id > 0) return id;
                const qp = Number(new URLSearchParams(window.location.search).get('id'));
                if (Number.isInteger(qp) && qp > 0) return qp;
                const stored = Number(localStorage.getItem('individual_last_contest_id'));
                return Number.isInteger(stored) && stored > 0 ? stored : null;
            };
            const parseDate = (v) => {
                if (!v) return null;
                const d = new Date(v);
                return Number.isNaN(d.getTime()) ? null : d;
            };
            const formatDate = (v) => {
                const d = parseDate(v);
                return d ? d.toLocaleString() : 'TBA';
            };
            const statusBadge = (contest) => {
                const now = new Date();
                const s = parseDate(contest.startDate || contest.date);
                const e = parseDate(contest.endDate || contest.deadline);
                if (e && e < now) return '<span class="px-3 py-1 rounded-full text-xs font-semibold bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200">Completed</span>';
                if (s && s > now) return '<span class="px-3 py-1 rounded-full text-xs font-semibold bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300">Upcoming</span>';
                return '<span class="px-3 py-1 rounded-full text-xs font-semibold bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300">Live</span>';
            };
            const renderContest = (contest, leaderboard = []) => {
                const problems = Array.isArray(contest.problems) ? contest.problems : [];
                const joinButton = !contest.can_join
                    ? '<button disabled class="w-full bg-gray-300 dark:bg-gray-700 text-gray-600 dark:text-gray-300 font-semibold py-3 rounded-lg cursor-not-allowed">Not Eligible</button>'
                    : contest.joined
                        ? '<button disabled class="w-full bg-green-600 text-white font-semibold py-3 rounded-lg cursor-not-allowed"><i class="fas fa-check mr-2"></i>Joined</button>'
                        : '<button id="joinContestBtn" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-3 rounded-lg transition-colors">Join Contest</button>';
                const leaderboardMarkup = leaderboard.length
                    ? leaderboard.slice(0, 10).map((entry) => `
                        <li class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-700 last:border-0">
                            <span class="text-sm text-gray-700 dark:text-gray-200">${entry.rank}. ${esc(entry.fullName)}</span>
                            <span class="text-xs font-semibold text-primary-600 dark:text-primary-200">${entry.score} pts</span>
                        </li>`).join('')
                    : '<li class="text-sm text-gray-500 dark:text-gray-400">No submissions yet.</li>';

                content.innerHTML = `
                    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-primary-100 dark:border-gray-700 p-6 md:p-8 mb-6">
                        <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                            <div>
                                <div class="flex items-center gap-2 mb-2">${statusBadge(contest)}</div>
                                <h1 class="text-3xl font-bold text-gray-900 dark:text-white">${esc(contest.title || 'Untitled Contest')}</h1>
                                <p class="text-gray-600 dark:text-gray-300 mt-2">${esc(contest.description || contest.rulesAndDescription || 'No description available.')}</p>
                            </div>
                            <div class="bg-primary-50 dark:bg-gray-700/60 rounded-xl p-4 min-w-[180px] border border-primary-100 dark:border-gray-600">
                                <p class="text-xs text-gray-500 dark:text-gray-300 uppercase mb-1">Hosted By</p>
                                <p class="text-sm font-semibold text-gray-800 dark:text-white">${esc(contest.creatorName || 'CampusCode')}</p>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 space-y-6">
                            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-primary-100 dark:border-gray-700 p-6">
                                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">Contest Details</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                    <div><p class="text-gray-500 dark:text-gray-400">Start</p><p class="font-semibold text-gray-800 dark:text-gray-200">${formatDate(contest.startDate || contest.date)}</p></div>
                                    <div><p class="text-gray-500 dark:text-gray-400">End</p><p class="font-semibold text-gray-800 dark:text-gray-200">${formatDate(contest.endDate || contest.deadline)}</p></div>
                                    <div><p class="text-gray-500 dark:text-gray-400">Duration</p><p class="font-semibold text-gray-800 dark:text-gray-200">${esc(contest.duration || 'TBA')}</p></div>
                                    <div><p class="text-gray-500 dark:text-gray-400">Prize</p><p class="font-semibold text-gray-800 dark:text-gray-200">${esc(contest.prize || 'Not specified')}</p></div>
                                </div>
                            </div>
                            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-primary-100 dark:border-gray-700 p-6">
                                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-3">Guidelines</h3>
                                <p class="text-gray-600 dark:text-gray-300 whitespace-pre-line">${esc(contest.guidelines || contest.rulesAndDescription || 'No guidelines provided.')}</p>
                            </div>
                        </div>
                        <aside class="space-y-6">
                            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-primary-100 dark:border-gray-700 p-6">
                                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-3">Problems</h3>
                                <p class="text-sm text-gray-600 dark:text-gray-300 mb-3">${problems.length} problem(s) configured</p>
                                <ul class="space-y-2 text-sm">
                                    ${problems.length ? problems.map((p, idx) => `
                                        <li class="px-3 py-2 rounded bg-gray-50 dark:bg-gray-700/40 text-gray-700 dark:text-gray-200">
                                            <div class="flex items-start justify-between gap-3">
                                                <div>
                                                    <p class="font-medium">Problem ${idx + 1}: ${esc(p.title || `Problem #${p.id}`)}</p>
                                                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">${esc(p.difficulty || 'Easy')} • ${p.points || 0} XP</p>
                                                </div>
                                                ${contest.joined
                                                    ? `<a href="/individual/problem/${p.id}?contestId=${contest.id}" class="shrink-0 px-3 py-1.5 rounded-md bg-primary-500 hover:bg-primary-600 text-white text-xs font-semibold">${p.solved ? 'Re-solve' : 'Solve'}</a>`
                                                    : '<span class="shrink-0 px-3 py-1.5 rounded-md bg-gray-200 dark:bg-gray-600 text-gray-600 dark:text-gray-200 text-xs font-semibold">Join first</span>'}
                                            </div>
                                        </li>`).join('')
                                        : '<li class="text-gray-500 dark:text-gray-400">Problem list will appear here.</li>'}
                                </ul>
                            </div>
                            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-primary-100 dark:border-gray-700 p-6">${joinButton}</div>
                            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-primary-100 dark:border-gray-700 p-6">
                                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-3">Leaderboard</h3>
                                <ul class="space-y-0">${leaderboardMarkup}</ul>
                            </div>
                        </aside>
                    </div>`;

                const joinBtn = document.getElementById('joinContestBtn');
                if (joinBtn) joinBtn.addEventListener('click', joinContest);
            };
            const loadOverlayProfile = async () => {
                try {
                    const res = await fetch('/individual/api/profile-data');
                    const data = await res.json();
                    if (!data.success) return;
                    const p = data.profile.user || {};
                    document.querySelector('#headerProfileBtn div')?.replaceChildren(document.createTextNode(p.initials || 'I'));
                    document.querySelector('#headerProfileBtn span')?.replaceChildren(document.createTextNode(p.fullName || 'Individual'));
                    document.getElementById('overlayAvatar').textContent = p.initials || 'I';
                    document.getElementById('overlayName').textContent = p.fullName || 'Individual';
                    document.getElementById('overlayEmail').textContent = p.email || '';
                    document.getElementById('overlaySolved').textContent = String(p.solved || 0);
                    document.getElementById('overlayRank').textContent = p.globalRank || '#-';
                    document.getElementById('overlayPoints').textContent = String(p.points || 0);
                } catch (_) {}
            };
            const joinContest = async () => {
                try {
                    const id = getContestId();
                    const res = await fetch(`/individual/api/contests/${id}/join`, { method: 'POST' });
                    const payload = await res.json();
                    if (!payload.success) throw new Error(payload.error || 'Failed to join contest.');
                    await loadContest();
                } catch (err) {
                    alert(err.message);
                }
            };
            const loadContest = async () => {
                const id = getContestId();
                if (!id) {
                    content.innerHTML = '<div class="bg-white dark:bg-gray-800 rounded-xl border border-red-200 dark:border-red-700 p-6 text-red-600 dark:text-red-300">Invalid contest id.</div>';
                    return;
                }
                const res = await fetch(`/individual/api/contests/${id}`);
                const payload = await res.json();
                if (!payload.success || !payload.contest) throw new Error(payload.error || 'Contest not found');
                localStorage.setItem('individual_last_contest_id', String(id));
                renderContest(payload.contest, payload.leaderboard || []);
            };
            loadOverlayProfile();
            loadContest().catch((err) => {
                content.innerHTML = `<div class="bg-white dark:bg-gray-800 rounded-xl border border-red-200 dark:border-red-700 p-6 text-red-600 dark:text-red-300">${esc(err.message)}</div>`;
            });
        });
    </script>
  </body>
</html>
